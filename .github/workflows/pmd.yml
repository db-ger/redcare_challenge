name: PMD

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  pmd:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Run PMD
        run: ./gradlew pmdMain pmdTest